<section id="history-books-section">
  <header>
    <h1>History Books</h1>
    <p>Explore 100 history books</p>
  </header>
  <div id="history-books" class="books"></div>
</section>
<script>
    async function loadHistoryBooks() {
  const container = document.getElementById("history-books");
  let loaded = 0;
  let page = 1;
  const totalBooks = 100;

  while (loaded < totalBooks) {
    const res = await fetch(`https://openlibrary.org/search.json?q=history&language=eng&has_fulltext=true&page=${page}`);
    const data = await res.json();
    if (!data.docs || data.docs.length === 0) break;

    for (const book of data.docs) {
      if (loaded >= totalBooks) break;
      if (!book.cover_i) continue;

      const bookDiv = document.createElement("div");
      bookDiv.className = "book";
      bookDiv.innerHTML = `
        <img src="https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg" alt="${book.title}">
        <p>${book.title}</p>
      `;

      container.appendChild(bookDiv);
      loaded++;
    }
    page++;
  }
}

loadHistoryBooks();
</script>
<style>
    #history-books-section {
  padding: 20px;
  background: linear-gradient(90deg,#000000,rgb(11, 24, 49));
  color: #fff;
  font-family: Arial, sans-serif;
}

#history-books-section h1 {
  text-align: center;
  color: #ffcc00;
  text-shadow: 0 0 10px #ffcc00;
}

#history-books-section p {
  text-align: center;
  color: #ccc;
  margin-bottom: 30px;
}

.books {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.book {
  flex: 0 1 160px;
  background-color: #0b1831;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  text-align: center;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.book:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.8);
}

.book img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.book p {
  margin: 10px 5px;
  font-size: 0.95rem;
  color: #fff;
  text-shadow: 0 0 5px #fff;
  min-height: 40px;
}
</style>
